services:
  - type: web
    name: machliphon-server
    env: node
    plan: free
    buildCommand: NODE_ENV=development npm install && npm run build --workspace=server
    startCommand: npm run start --workspace=server
    healthCheckPath: /api/auth
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false

databases:
  - name: machliphon-db
    databaseName: machliphon
    user: machliphon
    plan: free
