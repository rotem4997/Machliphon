services:
  - type: web
    name: machliphon-server
    env: node
    plan: free
    buildCommand: NODE_ENV=development npm install && npm run build --workspace=server
    startCommand: npm run start --workspace=server
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: machliphon-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://machliphon-client.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://machliphon-client.vercel.app

databases:
  - name: machliphon-db
    databaseName: machliphon
    user: machliphon
    plan: free
